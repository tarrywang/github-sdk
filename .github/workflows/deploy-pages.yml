name: Deploy GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'Lab-01-Tech-Insights/frontend/**'
      - 'Lab-04-Overseas-Insights/frontend/**'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4
        with:
          enablement: true

      - name: Assemble combined site
        run: |
          rm -rf _site
          mkdir -p _site/overseas
          # Lab-01 (EV 洞察) 保持根路径，现有 URL 不变
          cp -r Lab-01-Tech-Insights/frontend/. _site/
          # Lab-04 (出海洞察) 发布到 /overseas/
          cp -r Lab-04-Overseas-Insights/frontend/. _site/overseas/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
